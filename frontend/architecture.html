<!DOCTYPE html>
<html>

<meta charset="UTF-8"/>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

</head>
<body>
<h1>HerdWatch — System Architecture</h1>
<div class="subtitle">Data flow · API endpoints · Component relationships</div>

  <!-- Background -->

    <line x1="0" y1="420" x2="960" y2="420"/>

  <text x="12" y="444" fill="#5a7063" font-size="10" font-family="DM Mono" text-anchor="start" letter-spacing="1">FRONTEND / BROWSER</text>

  <!-- Video Source -->

  <text x="130" y="70" text-anchor="middle" font-family="Syne" font-size="13" font-weight="700" fill="#dde8e0">Video Source</text>

  <text x="130" y="159" text-anchor="middle" font-size="9" fill="#8fa897" font-family="DM Mono">video_analyzer.py</text>

  <rect x="390" y="40" width="180" height="160" rx="12" fill="#161b18" stroke="#2f3d36" stroke-width="1.5"/>

  <text x="480" y="88" text-anchor="middle" font-size="9" fill="#5a7063" font-family="DM Mono">gemini-1.5-flash</text>
  <text x="420" y="120" font-size="36" opacity="0.7">🤖</text>
  <rect x="410" y="145" width="140" height="20" rx="4" fill="#1d2520"/>
  <text x="480" y="159" text-anchor="middle" font-size="9" fill="#8fa897" font-family="DM Mono">langchain_google_genai</text>

  <text x="830" y="159" text-anchor="middle" font-size="9" fill="#8fa897" font-family="DM Mono">at.py · SMS class</text>

  <rect x="40" y="292" width="140" height="22" rx="8" fill="#1e3a28"/>
  <rect x="40" y="305" width="140" height="9" fill="#1e3a28"/>

  <text x="110" y="356" text-anchor="middle" font-size="8" fill="#5a7063" font-family="DM Mono">cow_analysis_data.json</text>
  <text x="110" y="370" text-anchor="middle" font-size="8" fill="#3a4d42" font-family="DM Mono">Poll: 5s interval</text>

  <rect x="195" y="292" width="140" height="22" rx="8" fill="#1e3a28"/>
  <rect x="195" y="305" width="140" height="9" fill="#1e3a28"/>

  <text x="232" y="308" font-size="8" fill="#8fa897" font-family="DM Mono">/analysis/log</text>

  <text x="265" y="356" text-anchor="middle" font-size="8" fill="#5a7063" font-family="DM Mono">with error flags</text>
  <text x="265" y="370" text-anchor="middle" font-size="8" fill="#3a4d42" font-family="DM Mono">?lines=100</text>

  <rect x="350" y="292" width="130" height="90" rx="8" fill="#222b25" stroke="#2f3d36"/>
  <rect x="350" y="292" width="130" height="22" rx="8" fill="#3d2416"/>
  <rect x="350" y="305" width="130" height="9" fill="#3d2416"/>

  <text x="415" y="370" text-anchor="middle" font-size="8" fill="#3a4d42" font-family="DM Mono">{message}→{response}</text>

  <rect x="495" y="292" width="130" height="22" rx="8" fill="#3d2416"/>
  <rect x="495" y="305" width="130" height="9" fill="#3d2416"/>
  <text x="507" y="308" font-size="8" fill="#c87941" font-family="DM Mono" font-weight="500">POST</text>

  <text x="560" y="356" text-anchor="middle" font-size="8" fill="#5a7063" font-family="DM Mono">{recipients, msg,</text>

  <text x="710" y="342" text-anchor="middle" font-size="8" fill="#5a7063" font-family="DM Mono">incoming SMS, run AI,</text>
  <text x="710" y="356" text-anchor="middle" font-size="8" fill="#5a7063" font-family="DM Mono">auto-reply to farmer</text>
  <text x="710" y="370" text-anchor="middle" font-size="8" fill="#3a4d42" font-family="DM Mono">Stores in memory</text>

  <rect x="795" y="292" width="135" height="90" rx="8" fill="#222b25" stroke="#2f3d36"/>
  <rect x="795" y="292" width="135" height="22" rx="8" fill="#1e3a28"/>
  <rect x="795" y="305" width="135" height="9" fill="#1e3a28"/>
  <text x="807" y="308" font-size="8" fill="#4ade80" font-family="DM Mono" font-weight="500">GET</text>
  <text x="833" y="308" font-size="8" fill="#8fa897" font-family="DM Mono">/conversations</text>

  <text x="862" y="342" text-anchor="middle" font-size="8" fill="#5a7063" font-family="DM Mono">single ?phone=...</text>
  <text x="862" y="356" text-anchor="middle" font-size="8" fill="#5a7063" font-family="DM Mono">POST /clear to wipe</text>
  <text x="862" y="370" text-anchor="middle" font-size="8" fill="#3a4d42" font-family="DM Mono">In-memory dict</text>

  <!-- Dashboard -->
  <rect x="40" y="448" width="155" height="90" rx="10" fill="#222b25" stroke="#2f3d36"/>
  <rect x="40" y="448" width="155" height="4" rx="2" fill="#4ade80"/>

  <text x="117" y="486" text-anchor="middle" font-size="8" fill="#5a7063" font-family="DM Mono">Status ring · Herd mini</text>

  <text x="287" y="500" text-anchor="middle" font-size="8" fill="#5a7063" font-family="DM Mono">Filter ok/error</text>
  <text x="287" y="514" text-anchor="middle" font-size="8" fill="#5a7063" font-family="DM Mono">Refresh on demand</text>

  <rect x="380" y="448" width="155" height="90" rx="10" fill="#222b25" stroke="#2f3d36"/>

  <text x="457" y="514" text-anchor="middle" font-size="8" fill="#5a7063" font-family="DM Mono">Click → AI chat query</text>
  <text x="457" y="527" text-anchor="middle" font-size="8" fill="#3a4d42" font-family="DM Mono">State in JS, sync to AI</text>

  <text x="610" y="527" text-anchor="middle" font-size="8" fill="#3a4d42" font-family="DM Mono">POST /test</text>

  <!-- SMS Center -->
  <rect x="685" y="448" width="120" height="90" rx="10" fill="#222b25" stroke="#2f3d36"/>

  <text x="745" y="527" text-anchor="middle" font-size="8" fill="#3a4d42" font-family="DM Mono">POST /send</text>

  <!-- Conversations -->
  <rect x="820" y="448" width="120" height="90" rx="10" fill="#222b25" stroke="#2f3d36"/>
  <rect x="820" y="448" width="120" height="4" rx="2" fill="#c87941"/>

  <text x="880" y="527" text-anchor="middle" font-size="8" fill="#3a4d42" font-family="DM Mono">GET + POST /conv...</text>

  <!-- ═══════════ ARROWS: Sources → Backend ═══════════ -->

  <!-- video_analyzer writes JSON → /analysis/status -->
  <line x1="130" y1="200" x2="130" y2="248" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)" opacity="0.7"/>
  <text x="134" y="235" font-size="8" fill="#3a4d42" font-family="DM Mono">cow_analysis_data.json</text>

  <line x1="480" y1="200" x2="415" y2="292" stroke="#c87941" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-copper)" opacity="0.7"/>

  <!-- ═══════════ LEGEND ═══════════ -->
  <rect x="40" y="556" width="880" height="80" rx="8" fill="#161b18" stroke="#2f3d36"/>

  <line x1="270" y1="600" x2="320" y2="600" stroke="#c87941" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arr-copper)"/>

  <text x="620" y="604" font-size="9" fill="#8fa897" font-family="DM Mono">POST endpoint</text>
